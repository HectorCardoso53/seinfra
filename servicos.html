<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Serviços da SEINFRA</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: #f4f6f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* HEADER */

        .header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header-logo {
            width: 90px;
            margin-bottom: 10px;
        }

        .header h2 {
            margin: 0;
            font-size: 26px;
        }

        .header p {
            margin: 4px 0;
            font-size: 14px;
        }

        .header span {
            font-size: 12px;
            opacity: .9;
        }

        /* CARDS */

        .cards {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            padding: 40px;
        }

        .card {
            width: 260px;
            background: white;
            border-radius: 14px;
            padding: 35px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #e0e4ea;
            box-shadow: 0 8px 22px rgba(0, 0, 0, .08);
            transition: .25s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 35px rgba(0, 0, 0, .15);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
            color: #3498db;
        }

        /* FOOTER */

        .footer {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 12px;
            font-size: 13px;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: auto;
        }
    </style>

</head>

<body>

    <!-- HEADER -->

    <div class="header">

        <img src="assets/img/prefeitura.png" class="header-logo">

        <h2>Sistema de Controle</h2>

        <p>SEINFRA – Secretaria de Infraestrutura</p>

        <span>Secretária: Liliana Bentes</span>

    </div>

    <!-- CARDS -->

    <div class="cards">

        <div class="card" onclick="abrirAgendamento()">

            <div class="icon">
                <i class="bi bi-calendar-check"></i>
            </div>

            <h3>Agendamento</h3>

            <p>Cadastro de visitas</p>

        </div>

        <div class="card" onclick="abrirOS()">

            <div class="icon">
                <i class="bi bi-tools"></i>
            </div>

            <h3>Ordem de Serviço</h3>

            <p>Gerenciamento das OS</p>

        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">

        <div class="footer-content">

            <span>
                SEMEG – Secretaria de Eficiência Governamental
            </span>

            <span>
                Prefeitura Municipal de Oriximiná
            </span>

        </div>

    </div>

    <script>

        function abrirAgendamento() {
            window.location.href = "home.html"
        }

        function abrirOS() {
            window.location.href = "dashboard.html"
        }

    </script>

</body>

</html>
